name: Deploy to Dokku (VPS 157)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_PRIVATE_KEY }}" > ~/.ssh/dokku_deploy
          chmod 600 ~/.ssh/dokku_deploy
          cat >> ~/.ssh/known_hosts << 'EOF'
          157.173.118.98 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL832hmYdG9c/EoReDMoM0CAJFH42adI/+1plnTR7Zak
          157.173.118.98 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBKsupDv5MoxI/gbIis2SL1LxI7ScOExGOsmP5OjwXdkk1q2cDQ2EKaaBFhroZf15qz8d3nd07oSA+GEEN0lXSN4=
          EOF

      - name: Push to Dokku
        run: |
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/dokku_deploy -o IdentitiesOnly=yes"
          git remote add dokku dokku@157.173.118.98:site-nutrigen || true
          git push dokku HEAD:master --force
